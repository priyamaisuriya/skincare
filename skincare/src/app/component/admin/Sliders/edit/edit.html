<section class="section">
    <div class="section-header">
        <div class="section-header-back">
            <a href="" class="btn btn-icon"><i class="fas fa-arrow-left"></i></a>
        </div>

        <h1>Manage Sliders</h1>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
            <div class="breadcrumb-item">Manage Sliders</div>
        </div>
    </div>

    <div class="section-body">
        <h2 class="section-title">Manage Sliders</h2>
        <p class="section-lead"> On this page you can create a new sliders and fill in all
            fields.</p>
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Manage Your Sliders</h4>

                    </div>
                    <div class="card-body">
                        <div class="form-group  mb-4">
                            <label class="col-form-label">
                                Image url</label>

                            <div id="image-preview" class="image-preview" style="width: 150px; height: 150px;">
                                <label for="image-upload" id="image-label">Choose File</label>
                                <input type="file" name="image_url" id="image-upload" />
                            </div>

                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-4">
                                    <label class="col-form-label">Name</label>

                                    <input type="text" name="name" id="name" class="form-control"
                                        placeholder="please enter name" required>
                                    <div class="invalid-feedback">
                                        Please fill in your name
                                    </div>


                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row mb-4">
                                    <label class="col-form-label ">Description</label>
                                    <textarea class="summernote-simple form-control" name="description"
                                        id="slider_description" placeholder="Please enter slider description"
                                        required></textarea>


                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group  mb-4">
                                    <label class="col-form-label">Link</label>

                                    <input type="text" name="link" id="link" class="form-control"
                                        placeholder="please enter link" required>
                                    <div class="invalid-feedback">
                                        Please fill in your link
                                    </div>


                                </div>
                            </div>



                            <div class="col-md-6">
                                <div class="form-group row mb-4">
                                    <label class="col-form-label">Sort
                                        Order</label>

                                    <input type="number" name="sort_order" id="sort_order" class="form-control"
                                        placeholder="please enter sort_order" required>
                                    <div class="invalid-feedback">
                                        Please fill in your sort_order
                                    </div>


                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group row mb-4 align-items-center">
                                <label class="col-form-label">Status</label>
                                <div class="col-sm-12 col-md-7">
                                    <label class="custom-switch d-flex align-items-center mb-0">
                                        <input type="checkbox" name="status" value="1" class="custom-switch-input">
                                        <span class="custom-switch-indicator me-2"></span>
                                        <span class="custom-switch-description mb-0"></span>
                                    </label>
                                    <div class="invalid-feedback">
                                        Please fill in your status
                                    </div>
                                </div>
                            </div>
                        </div>



                    </div>
                </div>


                <div class="form-group mb-4">
                    <div class="text-right m-4">
                        <button class="btn btn-primary" type="submit">Submit</button>
                        <button type="button" class="btn btn-primary ml-2">Reset</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</section>
