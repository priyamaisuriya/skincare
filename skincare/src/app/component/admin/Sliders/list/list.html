<section class="section">
    <div class="section-header">
        <h1>Manage Sliders</h1>
        <div class="section-header-button">
            <a href="/admin/slider/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped v_center">
                                <thead>
                                    <tr>
                                        <th>Id</th>
                                        <th>Name</th>
                                        <th>Image url</th>
                                        <th>Sort Order</th>
                                        <th>Status</th>
                                        <th>Edit</th>
                                        <th>Delete</th>


                                    </tr>
                                </thead>
                                <tbody>
                                    @for(slider of sliders; track slider.id){
                                    <tr>
                                        <td>{{slider.id}}</td>
                                        <td>{{slider.name}}</td>
                                        <td>{{slider.image_url}}</td>
                                        <td>{{slider.sort_order}}</td>
                                        <td>{{slider.status}}</td>
                                        <td>
                                            <a href="/admin/slider/edit/{{slider.id}}" class="btn btn-primary">Edit</a>
                                        </td>
                                        <td>
                                            <button (click)="deleteSlider(slider.id)" class="btn btn-danger">
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
