<section class="section">
    <div class="section-header">
        <h1>Manage Users</h1>
        <div class="section-header-button">
            <a routerLink="/admin/user/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="users-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Full Name</th>
                                        <th>Email</th>
                                        <th>Status</th>
                                        <th>Profile image</th>
                                        <th>Edit</th>
                                        <th>Delete</th>


                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let user of users | async">
                                        <td>{{user.id}}</td>
                                        <td>{{user.name}}</td>
                                        <td>{{user.email}}</td>
                                        <td>
                                            @if (user.status) {
                                            <span class="badge badge-success">Active</span>
                                            } @else {
                                            <span class="badge badge-danger">Inactive</span>
                                            }
                                        </td>
                                        <td>
                                            <ng-container *ngIf="user.profile_image; else noImage">
                                                <img src="http://127.0.0.1:8000/storage/{{user.profile_image}}"
                                                    alt="{{user.name}}" width="50" height="50"
                                                    style="border-radius: 50%; object-fit: cover;">
                                            </ng-container>
                                            <ng-template #noImage>
                                                <div
                                                    style="width: 50px; height: 50px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;">
                                                    <i class="fas fa-user text-muted"></i>
                                                </div>
                                            </ng-template>
                                        </td>
                                        <td>
                                            <a [routerLink]="['/admin/user/edit', user.id]" class="btn btn-primary"><i
                                                    class="fas fa-edit"></i></a>
                                        </td>
                                        <td>
                                            <button (click)="deleteUser(user.id)" class="btn btn-danger"><i
                                                    class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
