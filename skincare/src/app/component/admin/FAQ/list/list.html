<section class="section">

    <div class="section-header">
        <h1>Manage FAQ</h1>

        <div class="section-header-button">
            <a href="/admin/faq/create" class="btn btn-primary">
                Add New
            </a>
        </div>

        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active">
                <a href="#">Dashboard</a>
            </div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">

                    <div class="card-body">
                        <div class="table-responsive">

                            <table class="table table-striped v_center" id="faq-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Question</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    @for(faq of faqs; track faq.id){
                                    <tr>
                                        <td>{{faq.id}}</td>
                                        <td>{{faq.question}}</td>
                                        <td>
                                            <a href="/admin/faq/edit/{{faq.id}}" class="btn btn-primary">
                                                Edit
                                            </a>
                                        </td>
                                        <td>
                                            <button (click)="deleteFaq(faq.id)" class="btn btn-danger">
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                    }
                                </tbody>

                            </table>

                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</section>
