<section class="section">

    <div class="section-header">
        <h1>{{ isEditMode ? 'Edit FAQ' : 'Add FAQ' }}</h1>
    </div>

    <div class="section-body">

        <div class="card">
            <div class="card-body">

                <form [formGroup]="faqForm" (ngSubmit)="saveFaq()">

                    <div class="form-group">
                        <label>Question</label>
                        <input type="text" formControlName="question" class="form-control" placeholder="Enter Question"
                            required>
                    </div>

                    <!-- {{-- Answer --}} -->
                    <div class="form-group">
                        <label>Answer</label>
                        <textarea formControlName="answer" class="form-control" rows="5" placeholder="Enter Answer"
                            required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary mr-2">
                        {{ isEditMode ? 'Update ' : 'Save ' }}
                    </button>

                    <a routerLink="/admin/faq" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>
        </div>

    </div>
</section>
