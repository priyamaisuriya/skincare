<section class="section">
    <div class="section-header">
        <h1>Manage categories</h1>
        <div class="section-header-button">
            <a routerLink="/admin/categories/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="categories-table">
                                <thead>
                                    <tr>

                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Parent Category</th>
                                        <th>Show on Home Page </th>
                                        <th>Sort order</th>
                                        <th>Edit</th>
                                        <th>Delete</th>

                                    </tr>
                                </thead>
                                <tbody>

                                    <tr *ngFor="let cat of categories$ | async">
                                        <td>{{cat.id}}</td>
                                        <td>{{cat.name}}</td>
                                        <td>
                                            @if (cat.parent && cat.parent.name) {
                                            {{ cat.parent.name }}
                                            } @else {
                                            <span class="text-primary">Parent</span>
                                            }
                                        </td>
                                        <td>
                                            @if(cat.home_page){
                                            <span class="badge badge-success">Active</span>
                                            } @else {
                                            <span class="badge badge-danger">Inactive</span>
                                            }
                                        </td>
                                        <td>{{cat.sort_order}}</td>
                                        <td>
                                            <a [routerLink]="['/admin/categories/edit', cat.id]"
                                                class="btn btn-primary"><i class="fas fa-edit"></i></a>
                                        </td>
                                        <td>
                                            <button (click)="deleteCategory(cat.id)" class="btn btn-danger"><i
                                                    class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>



                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
