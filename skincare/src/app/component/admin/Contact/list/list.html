<section class="section">
    <div class="section-header">
        <h1>Contact Messages</h1>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="contacts-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Subject</th>
                                        <th>Message</th>
                                        <th>Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let contact of contacts$ | async">
                                        <td>{{contact.id}}</td>
                                        <td>{{contact.name}}</td>
                                        <td>{{contact.email}}</td>
                                        <td>{{contact.phone_number}}</td>
                                        <td>{{contact.subject}}</td>
                                        <td>{{contact.message}}</td>
                                        <td>{{contact.created_at}}</td>
                                        <td>
                                            <a [routerLink]="['/admin/contacts/edit', contact.id]"
                                                class="btn btn-info mr-2">
                                                View
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
