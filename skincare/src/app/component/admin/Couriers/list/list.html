<section class="section">
    <div class="section-header">
        <h1>Manage Couriers</h1>
        <div class="section-header-button">
            <a routerLink="/admin/courier/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
            <div class="breadcrumb-item">Manage Couriers</div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <!-- Loading State -->
                        <div *ngIf="loading" class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="sr-only">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Loading couriers...</p>
                        </div>

                        <!-- Table View -->
                        <div class="table-responsive" [hidden]="loading">
                            <table class="table table-striped" id="couriers-table">
                                <thead>
                                    <tr>
                                        <th>Id</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th class="text-center">Edit</th>
                                        <th class="text-center">Delete</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let courier of allCouriers">
                                        <td>{{ courier.id }}</td>
                                        <td>{{ courier.name }}</td>
                                        <td>{{ courier.email || 'N/A' }}</td>
                                        <td>{{ courier.phone || 'N/A' }}</td>
                                        <td class="text-center">
                                            <a [routerLink]="['/admin/courier/edit', courier.id]"
                                                class="btn btn-primary btn-sm">
                                                Edit
                                            </a>
                                        </td>
                                        <td class="text-center">
                                            <button (click)="deleteCouriers(courier.id)" class="btn btn-danger btn-sm">
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            <!-- Empty State -->
                            <div *ngIf="!loading && allCouriers.length === 0" class="text-center py-4 text-muted">
                                No couriers found.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
