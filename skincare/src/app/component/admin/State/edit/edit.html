<section class="section">
    <div class="section-header">
        <div class="section-header-back">
            <a href="admin/states" class="btn btn-icon"><i class="fas fa-arrow-left"></i></a>
        </div>

        <h1>Manage States</h1>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="#">Dashboard</a></div>
            <div class="breadcrumb-item">Manage States</div>
        </div>
    </div>

    <div class="section-body">
        <h2 class="section-title">Manage States</h2>
        <p class="section-lead"> On this page you can create a new states and fill in all
            fields.</p>
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h4>Manage Your States</h4>

                    </div>
                    <div class="card-body">

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-4">
                                    <label class="col-form-label">Name</label>

                                    <input type="text" name="name" id="name" class="form-control"
                                        placeholder="please enter name" required>
                                    <div class="invalid-feedback">
                                        Please fill in your name
                                    </div>


                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group row mb-4">
                                    <label class="col-form-label ">Code</label>
                                    <input type="text" name="code" id="state_code" class="form-control"
                                        placeholder="Please enter state code" required>
                                    <div class="invalid-feedback">
                                        Please fill in your state code
                                    </div>

                                </div>
                            </div>
                        </div>


                        <div class="form-group mb-4">
                            <div class="text-right m-4">
                                <button class="btn btn-primary" type="submit">Submit</button>
                                <button type="button" class="btn btn-primary ml-2">Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
