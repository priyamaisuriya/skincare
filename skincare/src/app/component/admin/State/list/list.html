<section class="section">
    <div class="section-header">
        <h1>Manage State</h1>
        <div class="section-header-button">
            <a href="/admin/states/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped v_center">
                                <thead>
                                    <tr>
                                        <th>Id</th>
                                        <th>Name</th>
                                        <th>Code</th>
                                        <th>Action</th>


                                    </tr>
                                </thead>
                                <tbody>
                                    @for(state of state; track state.id){
                                    <tr>
                                        <td>{{state.id}}</td>
                                        <td>{{state.name}}</td>
                                        <td>{{state.code}}</td>
                                        <td>
                                            <a href="/admin/state/edit/{{state.id}}" class="btn btn-primary">
                                                Edit

                                            </a>
                                        </td>
                                        <td>
                                            <button (click)="deleteState(state.id)" class="btn btn-danger">
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                    }
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
