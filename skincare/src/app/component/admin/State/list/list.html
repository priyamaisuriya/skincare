<section class="section">
    <div class="section-header">
        <h1>Manage State</h1>
        <div class="section-header-button">
            <a routerLink="/admin/state/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <!-- Loading State -->
                        @if (loading) {
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="sr-only">Loading...</span>
                            </div>
                            <p class="mt-2 text-muted">Loading states...</p>
                        </div>
                        }

                        <div class="table-responsive">
                            <table class="table table-striped" id="states-table">
                                <thead>
                                    <tr>
                                        <th>Id</th>
                                        <th>Name</th>
                                        <th>Code</th>
                                        <th class="text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let state of states$ | async">
                                        <td>
                                            {{ state.id }}
                                        </td>
                                        <td>
                                            {{ state.name }}
                                        </td>
                                        <td>
                                            {{ state.code }}
                                        </td>

                                        <td class="text-center">
                                            <a [routerLink]="['/admin/state/edit', state.id]"
                                                class="btn btn-primary btn-sm mr-1" data-toggle="tooltip"
                                                title="Edit"><i class="fas fa-pencil-alt"></i></a>

                                            <button type="button" (click)="deleteState(state.id)"
                                                class="btn btn-danger btn-sm" data-toggle="tooltip" title="Delete"><i
                                                    class="fas fa-trash"></i></button>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
