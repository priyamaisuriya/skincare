<section class="section">
    <div class="section-header">
        <h1>Manage Products</h1>
        <div class="section-header-button">
            <a routerLink="/admin/products/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
        </div>
    </div>

    <div class="section-body">

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="products-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Image</th>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Amount</th>
                                        <th>New</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let product of products$ | async">
                                        <td>{{product.id}}</td>
                                        <td>
                                            <img *ngIf="product.product_images && product.product_images.length > 0; else noImage"
                                                [src]="'http://127.0.0.1:8000/storage/' + product.product_images[0].image_url"
                                                class="rounded" width="50" height="50" style="object-fit: cover;"
                                                alt="Product Image">
                                            <ng-template #noImage>
                                                <div class="bg-light rounded d-flex align-items-center justify-content-center"
                                                    style="width: 50px; height: 50px;">
                                                    <i class="fas fa-image text-muted"></i>
                                                </div>
                                            </ng-template>
                                        </td>
                                        <td>{{product.name}}</td>
                                        <td>{{product.category_id}}</td>
                                        <td>{{product.amount}}</td>
                                        <td>
                                            <span class="badge"
                                                [ngClass]="product.is_new ? 'badge-info' : 'badge-light'">
                                                {{ product.is_new ? 'Yes' : 'No' }}
                                            </span>
                                        </td>
                                        <td>
                                            <a [routerLink]="['/admin/products/edit', product.id]"
                                                class="btn btn-primary btn-sm">
                                                Edit
                                            </a>
                                        </td>
                                        <td>
                                            <button (click)="deleteproducts(product.id)" class="btn btn-danger btn-sm">
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
