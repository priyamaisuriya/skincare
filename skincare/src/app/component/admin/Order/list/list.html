<section class="section">
    <div class="section-header">
        <h1>Manage Orders</h1>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a href="admin/order/create">Dashboard</a></div>
            <div class="breadcrumb-item">Orders</div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">

                        <div class="table-responsive">
                            <table class="table table-striped v_center">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Total Amount</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Show</th>
                                        <th>Edit</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    @for(order of orders; track order.id) {
                                    <tr>
                                        <td>{{ order.id }}</td>
                                        <td>{{ order.customer_id }}</td>
                                        <td>{{ order.total_amount }}</td>
                                        <td>{{ order.status }}</td>
                                        <td>{{ order.order_date }}</td>
                                        <td><button class="btn btn-primary" (click)="showOrder(order.id)">Show</button>
                                        </td>
                                        <td><button class="btn btn-warning" (click)="editOrder(order.id)">Edit</button>
                                        </td>
                                    </tr>
                                    }
                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
