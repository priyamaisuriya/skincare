<section class="section">
    <div class="section-header">
        <h1>Manage Orders</h1>
        <div class="section-header-button">
            <a routerLink="/admin/order/create" class="btn btn-primary">Add New </a>
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
            <div class="breadcrumb-item">Orders</div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">

                        <div class="table-responsive">
                            <table class="table table-striped" id="orders-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Total Amount</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Show</th>
                                        <th>Edit</th>
                                    </tr>
                                </thead>

                                <tbody *ngIf="orders$ | async as orders">
                                    <tr *ngFor="let order of orders">
                                        <td>{{ order.id }}</td>
                                        <td>{{ order.customer_name || order.customer_id }}</td>
                                        <td>{{ order.total_amount }}</td>
                                        <td>{{ order.status }}</td>
                                        <td>{{ order.order_date }}</td>
                                        <td>
                                            <a [routerLink]="['/admin/order/show', order.id]"
                                                class="btn btn-primary">Show</a>
                                        </td>
                                        <td>
                                            <a [routerLink]="['/admin/order/edit', order.id]"
                                                class="btn btn-warning">Edit</a>
                                        </td>
                                    </tr>
                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
