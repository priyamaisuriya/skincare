<section class="section">
    <div class="section-header">
        <h1>Manage Orders</h1>
        <div class="section-header-button">
            <!-- <a routerLink="/admin/order/create" class="btn btn-primary">Add New </a> -->
        </div>
        <div class="section-header-breadcrumb">
            <div class="breadcrumb-item active"><a routerLink="/admin/dashboard">Dashboard</a></div>
            <div class="breadcrumb-item">Orders</div>
        </div>
    </div>

    <div class="section-body">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">

                        <div class="table-responsive">
                            <table class="table table-striped" id="orders-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Total Amount</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th class="text-center">Show</th>
                                        <th class="text-center">Edit</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr *ngFor="let order of allOrders">
                                        <td>{{ order.id }}</td>
                                        <td>{{ order.customer_name }}</td>
                                        <td>{{ order.total_amount | currency:'INR':'symbol' }}</td>
                                        <td>
                                            <span class="badge" [ngClass]="{
                                                'badge-warning': order.status === 'pending' || order.status === '0' || order.status === 'Pending',
                                                'badge-success': order.status === 'completed' || order.status === '1' || order.status === 'Delivered' || order.status === 'delivered',
                                                'badge-danger': order.status === 'cancelled' || order.status === 'Cancelled',
                                                'badge-info': order.status === 'processing' || order.status === 'Processing' || order.status === 'Shipped',
                                                'badge-primary': order.status === 'Confirmed' || order.status === 'confirmed'
                                            }">
                                                {{ order.status }}
                                            </span>
                                        </td>
                                        <td>{{ order.order_date | date:'dd-MM-yyyy' }}</td>
                                        <td class="text-center">
                                            <a [routerLink]="['/admin/order/show', order.id]"
                                                class="btn btn-show-action">
                                                <i class="fas fa-eye text-white"></i>
                                            </a>
                                        </td>
                                        <td class="text-center">
                                            <a [routerLink]="['/admin/order/edit', order.id]"
                                                class="btn btn-edit-action">
                                                <i class="fas fa-pencil-alt text-white"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr *ngIf="allOrders.length === 0">
                                        <td colspan="7" class="text-center py-4 text-muted">
                                            No orders found matching your criteria.
                                        </td>
                                    </tr>
                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
